<script>
jQuery(function ($) {

    /* ==========================================================
       PART 1: Login Switch Logic (Guest vs Returning)
       (Standard logic from your original code)
    ========================================================== */
    
    var $loginForm = $('form.woocommerce-form-login');
    
    if ($loginForm.length) {
        // Hide standard notices
        $('.woocommerce-form-login-toggle').hide(); 
        $('.showlogin').closest('.woocommerce-info').hide();

        // Create Switch HTML
        var switchHTML = 
            '<div class="custom-login-switch-wrapper">' +
                '<span class="switch-text label-guest active">Guest Checkout</span>' +
                '<label class="switch-toggle">' +
                    '<input type="checkbox" id="c-login-toggle">' +
                    '<span class="slider round"></span>' +
                '</label>' +
                '<span class="switch-text label-returning">Returning Customer</span>' +
            '</div>';

        // Insert Switch
        if ($('form.checkout').length) {
            $(switchHTML).insertBefore('form.checkout');
        } else {
            $(switchHTML).insertBefore('#customer_details');
        }

        // Modal Logic
        $loginForm.wrap('<div class="c-login-modal-overlay"><div class="c-login-modal-content"></div></div>');
        $('.c-login-modal-content').prepend('<span class="c-modal-close">&times;</span>');

        $('#c-login-toggle').on('change', function() {
            if ($(this).is(':checked')) {
                $('.c-login-modal-overlay').fadeIn().css('display', 'flex');
                $('.label-returning').addClass('active');
                $('.label-guest').removeClass('active');
            }
        });

        function closeLoginModal() {
            $('.c-login-modal-overlay').fadeOut();
            $('#c-login-toggle').prop('checked', false);
            $('.label-guest').addClass('active');
            $('.label-returning').removeClass('active');
        }

        $('body').on('click', '.c-modal-close', function() { closeLoginModal(); });
        $('body').on('click', '.c-login-modal-overlay', function(e) {
            if (e.target === this) closeLoginModal();
        });
    }

/* ==========================================================
       PART 2: Side-by-Side Coupons & Gift Cards
       (Moves them into a Flex container)
    ========================================================== */

    function moveDiscountsAbove(targetSelector) {
        var $wrapper = jQuery('.custom-discount-flex-wrapper');
        var $target  = jQuery(targetSelector);
    
        if ($wrapper.length && $target.length) {
            $wrapper.insertBefore($target);
        }
    }

    setTimeout(function () {
        
        var $giftCardBlock = $('#pwgc-redeem-gift-card-form');
        var $couponForm = $('form.checkout_coupon.woocommerce-form-coupon');

        // 1. Hide the original "Have a coupon?" text link
        $('.woocommerce-info').each(function() {
            if ($(this).find('.showcoupon').length > 0) {
                $(this).hide();
            }
        });

        // 2. Logic to move them side-by-side
        if ($giftCardBlock.length && $couponForm.length) {
            
            // Create a wrapper to hold them
            var $flexWrapper = $('.custom-discount-flex-wrapper');

            if (!$flexWrapper.length) {
                $flexWrapper = $('<div class="custom-discount-flex-wrapper"></div>');
                $flexWrapper.insertBefore($giftCardBlock);
            }

            
            // Insert wrapper BEFORE the gift card block currently sits
            $flexWrapper.insertBefore($giftCardBlock);
            
            // Move both forms INTO the wrapper
            $giftCardBlock.appendTo($flexWrapper);
            $couponForm.appendTo($flexWrapper);

            // Force the coupon form to be visible
            $couponForm.show();
            $couponForm.addClass('force-visible');
        }
        moveDiscountsAbove('.custom-login-switch-wrapper');

    }, 4000); 

});

(function($) {
    
    function initAggressiveBookingFix() {
        let targetValue = 'AUTO_4TH'; 
        let $msgBox;

        // ===================================================
        // 1. THE AGGRESSIVE LOOP (Enforcer)
        // ===================================================
        setInterval(function() {
            const $endSelect = $('#wc-bookings-form-end-time');
            const $pickerContainer = $('.wc-bookings-time-block-picker');

            // 1a. Keep the message box alive
            if ($('#wc-custom-fixed-message').length === 0 && $pickerContainer.length > 0) {
                $pickerContainer.after('<div id="wc-custom-fixed-message" style="margin-top: 15px; padding: 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px;">Select a start time...</div>');
            }
            $msgBox = $('#wc-custom-fixed-message');

            // 1b. FIX: Only check if options disappeared (WooCommerce cleared times when changing room/day)
            if ($endSelect.length === 0 || $endSelect.find('option').length <= 1) {
                // If the message still shows a time from the previous room/day, clear the display
                if ($msgBox && $msgBox.text().indexOf('Selected End Time') !== -1) {
                    $msgBox.html('Select a start time...').css('border-color', '#ccc');
                }
                targetValue = 'AUTO_4TH';
                return; // Wait for new times to appear
            }

            // --- PHASE A: Set the Target (4th option) ---
            if (targetValue === 'AUTO_4TH') {
                let $validOptions = $endSelect.find('option').filter(function() {
                    return $(this).val() !== '' && $(this).val() !== '0';
                });

                if ($validOptions.length > 0) {
                    let $targetOpt = ($validOptions.length > 3) ? $validOptions.eq(3) : $validOptions.last();
                    targetValue = $targetOpt.val();
                    console.log('Target locked on date click: ' + targetValue);
                }
            }

            // --- PHASE B: Force Selection ---
            if (targetValue !== 'AUTO_4TH' && $endSelect.val() !== targetValue) {
                $endSelect.val(targetValue);
                $endSelect.trigger('change');
                updateMessageBox($endSelect);
                console.log('Correction applied: ' + targetValue);
            }
        }, 200);

        // ===================================================
        // 2. TRIGGERS (Safety backup)
        // ===================================================
        
        // Reset when clicking on party rooms or a new day on the calendar
        $('body').on('click', '.custom-resource-card, .bookable[data-handler="selectDay"]', function() {
            targetValue = 'AUTO_4TH';
            if ($msgBox) {
                $msgBox.html('Select a start time...').css('border-color', '#ccc');
            }
        });

        // Reset when changing the start time
        $('body').on('change', '#wc-bookings-form-start-time', function() {
            targetValue = 'AUTO_4TH';
            if ($msgBox) {
                $msgBox.html('Loading times...').css('border-color', '#ccc');
            }
        });

        // Trigger for user manually changing the end time
        $('body').on('change', '#wc-bookings-form-end-time', function(e) {
            if (e.originalEvent) { 
                targetValue = $(this).val();
                updateMessageBox($(this));
                console.log('User manually chose: ' + targetValue);
            }
        });

        function updateMessageBox($select) {
            if (!$msgBox) return;
            let $opt = $select.find('option:selected');
            if (!$opt.length || $opt.val() === '0') return;
            let text = $opt.text().split('(')[0].trim();
            $msgBox.html('Selected End Time: <strong>' + text + '</strong>')
                   .css('border-color', '#0f9d58').show();
        }
    }

    const bootstrap = setInterval(function() {
        if ($('.wc-bookings-date-picker').length) {
            console.log("Calendar found. Enforcer ready.");
            initAggressiveBookingFix();
            clearInterval(bootstrap);
        }
    }, 500);

})(jQuery);

</script>

<style>
    /* --- ORIGINAL CSS --- */
    .info-notice {
        display: block !important;
    }

    /* ====================
       LOGIN SWITCH STYLES
       ==================== */
    .custom-login-switch-wrapper {
        display: flex;
        align-items: center;
        justify-content: flex-start; 
        margin: 20px 0 30px 0;
        gap: 15px;
        font-family: inherit;
    }
    .switch-text {
        font-weight: 600;
        color: #aaa;
        font-size: 16px;
        transition: 0.3s;
    }
    .switch-text.active { color: #333; }
    .switch-toggle {
        position: relative;
        display: inline-block;
        width: 50px;
        height: 28px;
        margin-bottom: 0;
    }
    .switch-toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background-color: #ccc;
        transition: .4s;
        border-radius: 34px;
    }
    .slider:before {
        position: absolute;
        content: "";
        height: 20px;
        width: 20px;
        left: 4px;
        bottom: 4px;
        background-color: white;
        transition: .4s;
        border-radius: 50%;
    }
    input:checked + .slider { background-color: #000; }
    input:checked + .slider:before { transform: translateX(22px); }

    /* Modal Styles */
    .c-login-modal-overlay {
        display: none; 
        position: fixed;
        z-index: 99999;
        left: 0; top: 0;
        width: 100%; height: 100%;
        background-color: rgba(0,0,0,0.6);
        justify-content: center;
        align-items: center;
    }
    .c-login-modal-content {
        background-color: #fff;
        padding: 40px;
        border-radius: 8px;
        width: 90%;
        max-width: 500px;
        position: relative;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .c-modal-close {
        position: absolute;
        top: 15px; right: 20px;
        font-size: 30px;
        font-weight: bold;
        color: #999;
        cursor: pointer;
        line-height: 1;
    }
    .c-modal-close:hover { color: #000; }
    .c-login-modal-content form.woocommerce-form-login {
        display: block !important;
        border: none; margin: 0; padding: 0;
    }
    .woocommerce-form-login-toggle { display: none !important; }

    /* ====================
       SIDE-BY-SIDE LAYOUT (No ID Cloning)
       ==================== */
    
    /* 1. The Container */
    .custom-discount-flex-wrapper {
        display: flex;
        flex-direction: row; /* Side by side */
        gap: 20px; /* Space between the two forms */
        align-items: flex-start; /* Align to top */
        margin-top: 20px;
        width: 100%;
    }

    /* 2. The Children */
    #pwgc-redeem-gift-card-form,
    form.checkout_coupon.woocommerce-form-coupon {
        flex: 1; /* Equal width */
        width: 50%;
        /* No extra styling added here, it will use your theme defaults */
    }

    /* 3. Force Coupon Visible */
    form.checkout_coupon.woocommerce-form-coupon.force-visible {
        display: block !important; 
        margin-bottom: 0 !important;
    }
    
    /* 4. Fix Coupon Input Widths */
    form.checkout_coupon input[type="text"] {
        width: 100%;
        box-sizing: border-box;
    }

    /* 5. Mobile Responsiveness */
    @media (max-width: 768px) {
        .custom-discount-flex-wrapper {
            flex-direction: column;
        }
        #pwgc-redeem-gift-card-form,
        form.checkout_coupon.woocommerce-form-coupon {
            width: 100%;
        }
    }
</style>
